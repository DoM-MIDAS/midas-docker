name: smoke r-bioc-singlecell layer 3

# Builds examples/layer3-smoke/Dockerfile against the published base image.
# The Dockerfile itself does the smoke checks (pak install + requireNamespace).
# Nothing is pushed; build success is the pass condition.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read   # pulling the base from GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build (no push) — the Dockerfile runs the smoke checks
        uses: ./actions/build-image
        with:
          image: smoke/r-bioc-singlecell-layer3
          tags: smoke
          context: examples/layer3-smoke
          push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
