name: smoke r-bioc-singlecell layer 3

# Builds examples/layer3-smoke/Dockerfile against the published base image.
# The Dockerfile itself does the smoke checks (install + requireNamespace).
# Nothing is pushed; build success is the pass condition.
on:
  workflow_dispatch:

env:
  CONTEXT: examples/layer3-smoke

jobs:
  smoke:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read   # to pull the base from GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/powershell /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"

      # Login keeps working whether the base package is public or private.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build (no push) — Dockerfile runs the smoke checks
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ env.CONTEXT }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
