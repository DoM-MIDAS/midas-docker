name: 'Build & push container image'
description: >-
  Build a Docker image and (optionally) push it to GHCR. Handles disk cleanup,
  registry login, tag-immutability enforcement, BuildKit setup, and a digest
  summary. Designed to be called from this repo's Layer 2 build workflow and
  from arbitrary Layer 3 project repos.

inputs:
  image:
    description: >-
      Image reference base, without a tag. Example:
      ghcr.io/dom-midas/r-bioc-singlecell
    required: true
  tags:
    description: >-
      Tags to apply, one per line (or comma-separated). Each becomes
      <image>:<tag>.
    required: true
  context:
    description: 'Docker build context path'
    required: false
    default: '.'
  dockerfile:
    description: 'Path to Dockerfile (leave empty for <context>/Dockerfile)'
    required: false
    default: ''
  build-args:
    description: 'Multiline build args, one KEY=VALUE per line'
    required: false
    default: ''
  push:
    description: 'Push to the registry (true/false). Default true.'
    required: false
    default: 'true'
  platforms:
    description: 'Comma-separated build platforms'
    required: false
    default: 'linux/amd64'
  enforce-immutability:
    description: >-
      When pushing, refuse to overwrite any tag that already exists in the
      registry. True/false. Default true.
    required: false
    default: 'true'
  free-disk-space:
    description: >-
      Reclaim ~10 GB on the runner before building (matters for heavy bases
      like Bioconductor + texlive). True/false. Default true.
    required: false
    default: 'true'
  github-token:
    description: >-
      Token for GHCR login. Pass `secrets.GITHUB_TOKEN` from the caller; the
      calling job must declare `permissions: packages: write` (or `: read`
      for pull-only builds).
    required: true

outputs:
  digest:
    description: 'Image digest of the built (and, if push, published) image'
    value: ${{ steps.build.outputs.digest }}
  image-ref:
    description: 'First tag in <image>:<tag> form, for downstream summaries'
    value: ${{ steps.refs.outputs.first-ref }}

runs:
  using: 'composite'
  steps:
    # Order matters: fail-fast on tag-already-exists *before* spending time on
    # disk cleanup or buildx setup. Login is the only prerequisite for the
    # immutability check, so it runs first; everything else is deferred until
    # we know the build can actually publish.
    - name: Normalize tags into full <image>:<tag> refs
      id: refs
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        TAGS: ${{ inputs.tags }}
      run: |
        set -euo pipefail
        normalized="$(printf '%s' "$TAGS" | tr ',' '\n' | sed '/^[[:space:]]*$/d')"
        refs=""
        first=""
        while IFS= read -r tag; do
          # trim
          tag="$(echo "$tag" | awk '{$1=$1;print}')"
          [ -z "$tag" ] && continue
          ref="${IMAGE}:${tag}"
          [ -z "$first" ] && first="$ref"
          if [ -z "$refs" ]; then refs="$ref"; else refs="${refs}"$'\n'"${ref}"; fi
        done <<< "$normalized"
        if [ -z "$first" ]; then
          echo "::error::no tags provided" >&2
          exit 1
        fi
        {
          echo 'tag-refs<<EOF'
          echo "$refs"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
        echo "first-ref=$first" >> "$GITHUB_OUTPUT"

    # Login only happens on actual publishes. A pull-only / smoke build of a
    # public base needs no credentials, and keeping the write-capable token
    # out of ~/.docker/config.json shrinks blast radius on those runs.
    # `username` is a fixed non-attacker-controlled value because under the
    # GHCR token-auth model the password is what authenticates; the username
    # is only ever recorded, never validated. Using github.actor would leak a
    # fork-PR triggerer's chosen handle into the audit trail.
    - name: Log in to GHCR
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    - name: Refuse to overwrite any existing tag (fast-fail)
      if: ${{ inputs.push == 'true' && inputs.enforce-immutability == 'true' }}
      shell: bash
      timeout-minutes: 2
      env:
        REFS: ${{ steps.refs.outputs.tag-refs }}
      run: |
        set -euo pipefail
        while IFS= read -r ref; do
          [ -z "$ref" ] && continue
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "::error::${ref} already exists. Bump the tag/revision." >&2
            exit 1
          fi
        done <<< "$REFS"
        echo "All tags are unpublished; proceeding."

    - name: Free disk space
      if: ${{ inputs.free-disk-space == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # rm -rf already ignores missing paths (-f); set -euo trips on the
        # remaining failure modes (sudo wedged, mid-delete I/O error), which
        # are things we'd rather see than swallow.
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                    /usr/local/share/powershell /usr/share/swift \
                    "${AGENT_TOOLSDIRECTORY:-}"
        df -h /

    - name: Set up Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

    # Second immutability check, immediately before the build+push. Closes most
    # of the TOCTOU window between the fast-fail check above and the actual
    # push: now the only window where a colliding publish slips past is the
    # build itself. The early check is kept as a fail-fast convenience.
    - name: Re-check tags right before push (TOCTOU mitigation)
      if: ${{ inputs.push == 'true' && inputs.enforce-immutability == 'true' }}
      shell: bash
      timeout-minutes: 2
      env:
        REFS: ${{ steps.refs.outputs.tag-refs }}
      run: |
        set -euo pipefail
        while IFS= read -r ref; do
          [ -z "$ref" ] && continue
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "::error::${ref} appeared in the registry while we were preparing the build. Aborting before overwrite." >&2
            exit 1
          fi
        done <<< "$REFS"

    - name: Build and push
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.refs.outputs.tag-refs }}
        build-args: ${{ inputs.build-args }}
        # Per-image cache scope so Layer 2 and Layer 3 (and the smoke test)
        # cannot cross-pollute. cache-to is suppressed on no-push builds so a
        # smoke job never writes layers that a real build might pull from.
        cache-from: type=gha,scope=${{ inputs.image }}
        cache-to: ${{ inputs.push == 'true' && format('type=gha,mode=max,scope={0}', inputs.image) || '' }}

    - name: Verify push produced a digest
      if: ${{ inputs.push == 'true' }}
      shell: bash
      env:
        DIGEST: ${{ steps.build.outputs.digest }}
      run: |
        if [ -z "$DIGEST" ]; then
          echo "::error::push reported success but produced no digest; treat as a failed publish." >&2
          exit 1
        fi

    - name: Summary
      if: ${{ inputs.push == 'true' && steps.build.outputs.digest != '' }}
      shell: bash
      env:
        REFS: ${{ steps.refs.outputs.tag-refs }}
        DIGEST: ${{ steps.build.outputs.digest }}
        IMAGE: ${{ inputs.image }}
      run: |
        set -euo pipefail
        {
          echo "### Published"
          echo ""
          echo "**Image:** \`${IMAGE}\`"
          echo ""
          echo "**Tags:**"
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            tag="${ref##*:}"
            echo "- \`${tag}\`"
          done <<< "$REFS"
          echo ""
          echo "**Digest:** \`${DIGEST}\`"
          echo ""
          echo "Pin in a downstream Dockerfile:"
          echo '```dockerfile'
          echo "FROM ${IMAGE}@${DIGEST}"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
